version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Produção — EasyPanel Compose Project
#
# Variáveis obrigatórias a configurar no EasyPanel (Settings > Environment):
#
#   MYSQL_ROOT_PASSWORD   senha root do MySQL
#   MYSQL_PASSWORD        senha do usuário da aplicação
#   JWT_SECRET            string aleatória >= 32 chars
#   ENCRYPTION_KEY        hex de 32 bytes (openssl rand -hex 32)
#   GOOGLE_CLIENT_ID      credencial Google OAuth2
#   GOOGLE_CLIENT_SECRET  credencial Google OAuth2
#   BACKEND_DOMAIN        domínio do backend  ex: backend.123.45.67.89.sslip.io
#   FRONTEND_DOMAIN       domínio do frontend ex: frontend.123.45.67.89.sslip.io
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: schedule
      MYSQL_USER: schedule
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (Go API) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: 8080
      BASE_URL: https://${BACKEND_DOMAIN}

      DATABASE_URL: mysql://schedule:${MYSQL_PASSWORD}@mysql:3306/schedule

      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 168h

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: https://${BACKEND_DOMAIN}/api/v1/google/callback

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      CORS_ALLOWED_ORIGINS: https://${FRONTEND_DOMAIN}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
      - web
    labels:
      - "caddy=${BACKEND_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8080}}"

  # ── Frontend (Nuxt) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: https://${BACKEND_DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE_URL: https://${BACKEND_DOMAIN}
    networks:
      - internal
      - web
    labels:
      - "caddy=${FRONTEND_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 3000}}"

volumes:
  mysql_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  web:
    external: true
    name: easypanel
